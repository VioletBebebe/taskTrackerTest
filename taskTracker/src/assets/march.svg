<svg 
  width="200" 
  height="180" 
  viewBox="0 0 200 180" 
  xmlns="http://www.w3.org/2000/svg"
  style="filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));"
>
  <!-- Основной корпус камеры (бирюзовый, как у March 7th) -->
  <rect x="30" y="40" width="140" height="110" rx="12" fill="#5ac8ff" stroke="#3a9eff" stroke-width="4"/>

  <!-- Нижняя часть корпуса (более тёмный оттенок) -->
  <rect x="30" y="130" width="140" height="20" rx="0 0 12 12" fill="#4aa0e0"/>

  <!-- Объектив (большой круглый) -->
  <circle cx="100" cy="95" r="32" fill="#111133" stroke="#88ddff" stroke-width="6"/>
  <circle cx="100" cy="95" r="20" fill="#001122"/>
  <circle cx="100" cy="95" r="8" fill="#88ddff" opacity="0.6"/>

  <!-- Вспышка/лампа сверху -->
  <rect x="70" y="20" width="60" height="24" rx="6" fill="#334455"/>
  <circle cx="100" cy="32" r="8" fill="#ffffaa" opacity="0.9"/>

  <!-- Кнопка спуска (красная/розовая) -->
  <circle cx="150" cy="60" r="14" fill="#ff7090" stroke="#ff90b0" stroke-width="3"/>
  <circle cx="150" cy="60" r="6" fill="#ffffff" opacity="0.4"/>

  <!-- Маленькая снежинка/звёздочка на корпусе (фирменный элемент March 7th) -->
  <g transform="translate(50,70) scale(0.7)">
    <text x="0" y="0" font-size="32" fill="#ffffff" font-weight="bold" opacity="0.85">❄</text>
    <!-- или звёздочка: ✦ или ★ -->
  </g>

  <!-- Полоска для фото (белая, как у Polaroid) -->
  <rect x="40" y="145" width="120" height="30" fill="#f8f8ff" rx="4"/>
  <rect x="45" y="150" width="110" height="20" fill="#e0e0ff" rx="3"/>

  <!-- Лёгкое свечение вокруг объектива -->
  <circle cx="100" cy="95" r="45" fill="none" stroke="#a0e0ff" stroke-width="12" opacity="0.25"/>
</svg>